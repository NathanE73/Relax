openapi: 3.1.0
info:
  title: Example API
  version: 1.0.0

components:
  schemas:
    Pet:
      type: object
      properties:
        petType:
          type: string
      discriminator:
        propertyName: petType
        mapping:
          cat: '#/components/schemas/PetCat'
          dog: '#/components/schemas/PetDog'
      oneOf:
        - $ref: '#/components/schemas/PetCat'
        - $ref: '#/components/schemas/PetDog'
    PetCat:
      type: object
      properties:
        petType:
          type: string
          enum: [cat]
        name:
          type: string
        meow:
          type: boolean
        lives:
          type: integer
    PetDog:
      type: object
      properties:
        petType:
          type: string
          enum: [dog]
        name:
          type: string
        bark:
          type: boolean
        breed:
          type: string
